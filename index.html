<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施工架施工計畫</title>
<style>
  :root{--navy:#0b1f3a;--navy2:#13284a;--gold:#c9a14a;--gold2:#e0bf6e;--bg:#f5f3ee;--ink:#1c2530;--line:#d8d2c2;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Noto Sans TC","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#f5f3ee;padding:28px 32px;}
  header h1{margin:0;font-size:22px;}
  header span{color:var(--gold2);font-size:13px;display:block;margin-top:4px;}
  main{max-width:1100px;margin:0 auto;padding:28px 20px 60px;}
  .grid{display:grid;grid-template-columns:420px 1fr;gap:24px;}
  @media(max-width:860px){.grid{grid-template-columns:1fr;}}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px 22px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card h2{font-size:15px;margin:0 0 14px;color:var(--navy);border-bottom:2px solid var(--gold);padding-bottom:8px;}
  label{display:block;font-size:12.5px;color:#555;margin:10px 0 4px;}
  input,select{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;background:#fafaf8;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  button{margin-top:16px;width:100%;padding:11px;border:none;border-radius:7px;background:var(--navy);color:#fff;font-size:15px;font-weight:600;cursor:pointer;}
  button:hover{background:var(--navy2);}
  table{width:100%;border-collapse:collapse;margin-top:8px;}
  td,th{padding:7px 6px;border-bottom:1px solid #eee;font-size:13px;}
  th{background:#f5f3ee;font-weight:600;color:var(--navy);font-size:12px;text-align:left;}
  td:last-child{text-align:right;font-weight:600;}
  .ok{color:#1a7d3a;font-weight:700;}.ng{color:#c0392b;font-weight:700;}.warn{color:#e67e22;font-weight:700;}
  .note{font-size:12px;color:#888;margin-top:12px;line-height:1.7;}
  .sec{font-size:13px;font-weight:700;color:var(--navy);margin:14px 0 4px;border-left:3px solid var(--gold);padding-left:8px;}
  ul.chk{padding-left:18px;}ul.chk li{font-size:13px;margin:5px 0;}
  details.proc{margin-top:14px;border:1px solid var(--line);border-radius:8px;background:#fafaf8;}
  details.proc summary{cursor:pointer;padding:10px 14px;font-weight:700;font-size:13px;color:var(--navy);user-select:none;}
  details.proc pre{margin:0;padding:10px 16px 14px;font-family:"Courier New",monospace;font-size:11.5px;line-height:1.85;white-space:pre-wrap;color:#2c3e50;border-top:1px solid var(--line);}
</style>
</head>
<body>
<header>
  <h1>施工架施工計畫 (Scaffolding Plan)</h1>
  <span>框式施工架 · 職業安全衛生設施規則 · 連牆件規劃 · 載重檢核</span>
</header>
<main>
<div class="grid">
  <div class="card">
    <h2>施工架參數</h2>
    <div class="row2">
      <div><label>型式</label>
        <select id="type">
          <option value="frame">框式（H Frame）</option>
          <option value="tube">鋼管式（Tube & Coupler）</option>
          <option value="system">系統式（Ring Lock）</option>
        </select>
      </div>
      <div><label>總高度 H (m)</label><input id="H" type="number" value="12" step="0.5"></div>
    </div>
    <div class="row2">
      <div><label>框架寬 B (m)</label><input id="B" type="number" value="1.2" step="0.1"></div>
      <div><label>縱向間距 L (m)</label><input id="L" type="number" value="1.8" step="0.1"></div>
    </div>
    <div class="row2">
      <div><label>容許軸力 Pa (kN/腳)</label><input id="Pa" type="number" value="25"></div>
      <div><label>連牆件容許剪力 Qa (kN)</label><input id="Qa" type="number" value="6"></div>
    </div>
    <div class="sec">作業平台載重</div>
    <div class="row2">
      <div><label>活載重 q (kN/m²，≥2.0)</label><input id="q" type="number" value="2.4" step="0.1"></div>
      <div><label>同時作業層數</label><input id="nFloor" type="number" value="2"></div>
    </div>
    <div class="row2">
      <div><label>自重 Wd (kN/m²)</label><input id="Wd" type="number" value="0.5"></div>
      <div><label>設計風速 Vz (m/s)</label><input id="Vz" type="number" value="35"></div>
    </div>
    <div class="sec">接地</div>
    <div class="row2">
      <div><label>地盤容許承載力 qa (kN/m²)</label><input id="qa" type="number" value="100"></div>
      <div><label>施工架平面延伸長 (m)</label><input id="planLen" type="number" value="20"></div>
    </div>
    <button onclick="calc()">計算</button>
    <div class="note">依「職業安全衛生設施規則」§40：高度>5m設壁拉繫結；每45m²一連牆件，垂直≤5m，水平≤5.5m。</div>
  </div>
  <div class="card">
    <h2>計畫輸出</h2>
    <div id="result"><p style="color:#888">尚未計算</p></div>
    <details class="proc" id="proc-box" style="display:none">
      <summary>📋 計算過程（供第三方檢核）</summary>
      <pre id="proc-text"></pre>
    </details>
  </div>
</div>
</main>
<script>
function calc(){
  const type=document.getElementById('type').value;
  const H=+document.getElementById('H').value;
  const B=+document.getElementById('B').value;
  const L=+document.getElementById('L').value;
  const Pa=+document.getElementById('Pa').value;
  const Qa=+document.getElementById('Qa').value;
  const q=+document.getElementById('q').value;
  const nFloor=+document.getElementById('nFloor').value;
  const Wd=+document.getElementById('Wd').value;
  const Vz=+document.getElementById('Vz').value;
  const qa=+document.getElementById('qa').value;
  const planLen=+document.getElementById('planLen').value;

  const tribArea=B*L/2;
  const P_live=q*nFloor*tribArea;
  const P_dead=Wd*(H/2)*tribArea;
  const P_total=P_live+P_dead;
  const okVert=P_total<=Pa;
  const util=P_total/Pa*100;
  const HB=H/B;
  const okHB=HB<=4;
  const Fw_m2=0.5*1.25*Vz*Vz*1.3/1000;
  const tieSpacV=5.0,tieSpacH=5.5;
  const Fw_tie=Fw_m2*tieSpacV*tieSpacH;
  const okWind=Fw_tie<=Qa;
  const bpSize=0.15*0.15;
  const P_bearing=P_total/bpSize;
  const okBearing=P_bearing<=qa;
  const nFrames=Math.ceil(planLen/L);
  const nTie_req=Math.ceil(H*planLen/45);

  const typeNames={frame:'框式（H Frame）',tube:'鋼管式（Tube & Coupler）',system:'系統式（Ring Lock）'};

  document.getElementById('result').innerHTML=`
    <table>
      <tr><th>項目</th><th>數值 / 判定</th></tr>
      <tr><td>型式 / 高×寬×間距</td><td>${typeNames[type]} / ${H}m×${B}m×${L}m</td></tr>
      <tr><td>高寬比 H/B</td><td>${HB.toFixed(1)} ${okHB?'<span class="ok">≤4 OK</span>':'<span class="ng">>4 需加斜撐</span>'}</td></tr>
      <tr><td>分擔面積/腳</td><td>${tribArea.toFixed(2)} m²</td></tr>
      <tr><td>活載 P_live (kN/腳)</td><td>${P_live.toFixed(2)}</td></tr>
      <tr><td>自重 P_dead (kN/腳)</td><td>${P_dead.toFixed(2)}</td></tr>
      <tr><td>總垂直力 P (kN/腳)</td><td>${P_total.toFixed(2)}</td></tr>
      <tr><td>使用率 P/Pa</td><td>${util.toFixed(1)}% ${okVert?'<span class="ok">OK</span>':'<span class="ng">NG</span>'}</td></tr>
      <tr><td>接地壓力 (kN/m²)</td><td>${P_bearing.toFixed(1)} / ${qa} ${okBearing?'<span class="ok">OK</span>':'<span class="ng">NG</span>'}</td></tr>
      <tr><td>設計風壓 (kN/m²)</td><td>${Fw_m2.toFixed(3)}</td></tr>
      <tr><td>連牆件風力 (kN)</td><td>${Fw_tie.toFixed(2)} / ${Qa} ${okWind?'<span class="ok">OK</span>':'<span class="ng">NG</span>'}</td></tr>
      <tr><td>需設連牆件數</td><td>≥ ${nTie_req} 個</td></tr>
    </table>
    <ul class="chk">
      <li class="${H>5?'warn':'ok'}">高度${H}m ${H>5?'> 5m 須設壁拉繫（勞安規則§40）':'≤ 5m'}</li>
      <li class="${okHB?'ok':'ng'}">高寬比${HB.toFixed(1)} ${okHB?'≤4 OK':'>4 需斜撐'}</li>
      <li class="${q>=2.0?'ok':'ng'}">活載重${q} kN/m² ${q>=2.0?'≥2.0 OK':'< 2.0 NG'}</li>
      <li class="warn">H>7m 需技師設計、送審</li>
      <li class="warn">作業台板縫隙 ≤3cm（勞安規則§31）</li>
    </ul>`;

  const proc=`════════════════════════════════════════
施工架施工計畫 計算過程
規範依據：職業安全衛生設施規則 §40
════════════════════════════════════════

【一、輸入參數】
  型式    = ${typeNames[type]}
  H × B × L = ${H}m × ${B}m × ${L}m
  容許軸力 Pa = ${Pa} kN/腳
  連牆件容許剪力 Qa = ${Qa} kN
  作業活載 q = ${q} kN/m²，作業層數 = ${nFloor}
  自重 Wd = ${Wd} kN/m²
  設計風速 Vz = ${Vz} m/s
  地盤容許承載力 qa = ${qa} kN/m²
  平面延伸長 = ${planLen} m

【二、高寬比檢核】
  H/B = ${H} / ${B} = ${HB.toFixed(3)}
  規定：框式施工架 H/B ≤ 4
  判定：${HB.toFixed(3)} ${okHB?'≤ 4 → OK ✓':'> 4 → NG ✗ 需增設斜撐或連牆件'}

【三、每腳垂直載重計算】
  每腳分擔面積（2腳/框）：
    A_trib = B × L / 2 = ${B} × ${L} / 2 = ${tribArea.toFixed(3)} m²

  活載（${nFloor}層作業）：
    P_live = q × 層數 × A_trib
           = ${q} × ${nFloor} × ${tribArea.toFixed(3)}
           = ${P_live.toFixed(3)} kN

  自重（簡化取半高分擔）：
    P_dead = Wd × (H/2) × A_trib
           = ${Wd} × (${H}/2) × ${tribArea.toFixed(3)}
           = ${P_dead.toFixed(3)} kN

  總垂直力 P = P_live + P_dead
            = ${P_live.toFixed(3)} + ${P_dead.toFixed(3)}
            = ${P_total.toFixed(3)} kN

  容許軸力 Pa = ${Pa} kN
  使用率 = ${P_total.toFixed(3)} / ${Pa} × 100% = ${util.toFixed(2)}%
  判定：${P_total.toFixed(3)} ${okVert?'≤':'>'} ${Pa} → ${okVert?'OK ✓':'NG ✗ 需減少作業層數或縮小框距'}

【四、底板接地承載驗算】
  底板 150×150mm → 面積 = 0.15×0.15 = ${bpSize.toFixed(4)} m²
  接地壓力 = P / 底板面積 = ${P_total.toFixed(3)} / ${bpSize.toFixed(4)}
           = ${P_bearing.toFixed(2)} kN/m²
  地盤容許承載力 qa = ${qa} kN/m²
  判定：${P_bearing.toFixed(2)} ${okBearing?'≤':'>'} ${qa} → ${okBearing?'OK ✓':'NG ✗ 需擴大底板或加地盤改良'}

【五、風力及連牆件計算】
  設計風速 Vz = ${Vz} m/s
  風壓 q_w = 0.5 × ρ × Vz² × Cf / 1000
           = 0.5 × 1.25 × ${Vz}² × 1.3 / 1000
           = 0.5 × 1.25 × ${Vz*Vz} × 1.3 / 1000
           = ${Fw_m2.toFixed(4)} kN/m²

  每連牆件分擔面積（垂直${tieSpacV}m × 水平${tieSpacH}m）：
    A_tie = ${tieSpacV} × ${tieSpacH} = ${tieSpacV*tieSpacH} m²

  每連牆件風力：
    Fw = q_w × A_tie = ${Fw_m2.toFixed(4)} × ${tieSpacV*tieSpacH}
       = ${Fw_tie.toFixed(3)} kN
  容許剪力 Qa = ${Qa} kN
  判定：${Fw_tie.toFixed(3)} ${okWind?'≤':'>'} ${Qa} → ${okWind?'OK ✓':'NG ✗ 需縮小連牆件間距'}

【六、連牆件數量計算（勞安規則§40）】
  規定：每 45m² 立面設一個連牆件
  立面總面積 = H × 延伸長 = ${H} × ${planLen} = ${H*planLen} m²
  需設連牆件數 = ⌈${H*planLen}/45⌉ = ${nTie_req} 個
  垂直方向間距 ≤ ${tieSpacV} m → 需設 ${Math.ceil(H/tieSpacV)} 排
  水平方向間距 ≤ ${tieSpacH} m → 需設 ${Math.ceil(planLen/tieSpacH)} 列`;

  document.getElementById('proc-text').textContent=proc;
  document.getElementById('proc-box').style.display='';
}
</script>
</body>
</html>
